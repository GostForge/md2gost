# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python tests

on: [push, pull_request, workflow_dispatch]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        echo ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true | sudo debconf-set-selections
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends ttf-mscorefonts-installer fontforge cabextract
        wget -q https://gist.githubusercontent.com/maxwelleite/10774746/raw/ttf-vista-fonts-installer.sh -O - | sudo bash
        sudo fc-cache -f
        python -m pip install --upgrade pip
        pip install flake8 pytest
        pip install .
    - name: Verify fonts
      run: |
        echo "=== fc-match results ==="
        fc-match --format="%{file} | %{family} | weight=%{weight} slant=%{slant}\n" "Times New Roman:weight=regular:slant=roman"
        fc-match --format="%{file} | %{family} | weight=%{weight} slant=%{slant}\n" "Times New Roman:weight=bold:slant=roman"
        fc-match --format="%{file} | %{family} | weight=%{weight} slant=%{slant}\n" "Times New Roman:weight=regular:slant=italic"
        fc-match --format="%{file} | %{family} | weight=%{weight} slant=%{slant}\n" "Times New Roman:weight=bold:slant=italic"
        fc-match --format="%{file} | %{family} | weight=%{weight} slant=%{slant}\n" "Calibri:weight=regular:slant=roman"
        fc-match --format="%{file} | %{family} | weight=%{weight} slant=%{slant}\n" "Courier New:weight=regular:slant=roman"
        fc-match --format="%{file} | %{family} | weight=%{weight} slant=%{slant}\n" "Consolas:weight=regular:slant=roman"
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      run: |
        pytest