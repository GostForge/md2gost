name: md2gost CI

on:
  push:
    paths:
      - "md2gost/**"
      - "tests/**"
      - "pyproject.toml"
      - "poetry.lock"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "md2gost/**"
      - "tests/**"
      - "pyproject.toml"
      - "poetry.lock"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install system fonts
        run: |
          echo ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true | sudo debconf-set-selections
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ttf-mscorefonts-installer fontforge cabextract
          wget -q https://gist.githubusercontent.com/maxwelleite/10774746/raw/ttf-vista-fonts-installer.sh -O - | sudo bash
          sudo fc-cache -f

      - name: Verify fonts
        run: |
          echo "=== fc-match results ==="
          fc-match --format="%{file} | %{family} | weight=%{weight} slant=%{slant}\n" "Times New Roman:weight=regular:slant=roman"
          fc-match --format="%{file} | %{family} | weight=%{weight} slant=%{slant}\n" "Times New Roman:weight=bold:slant=roman"
          fc-match --format="%{file} | %{family} | weight=%{weight} slant=%{slant}\n" "Times New Roman:weight=regular:slant=italic"
          fc-match --format="%{file} | %{family} | weight=%{weight} slant=%{slant}\n" "Calibri:weight=regular:slant=roman"
          fc-match --format="%{file} | %{family} | weight=%{weight} slant=%{slant}\n" "Courier New:weight=regular:slant=roman"

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Lint
        run: poetry run flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run tests
        run: poetry run pytest -q
