name: md2gost CI

on:
  push:
    paths:
      - "md2gost/**"
      - "tests/**"
      - "pyproject.toml"
      - "poetry.lock"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "md2gost/**"
      - "tests/**"
      - "pyproject.toml"
      - "poetry.lock"
      - ".github/workflows/ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install system fonts
        run: |
          echo ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true | sudo debconf-set-selections
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ttf-mscorefonts-installer fontforge cabextract
          wget -q https://gist.githubusercontent.com/maxwelleite/10774746/raw/ttf-vista-fonts-installer.sh -O - | sudo bash
          sudo fc-cache -f

      - name: Verify fonts
        run: |
          echo "=== Times New Roman variants ==="
          fc-list | grep -i "times new roman" || echo "NOT FOUND"
          echo "=== Calibri variants ==="
          fc-list | grep -i "calibri" || echo "NOT FOUND"
          echo "=== Courier New variants ==="
          fc-list | grep -i "courier" || echo "NOT FOUND"

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run tests
        run: poetry run pytest -q
